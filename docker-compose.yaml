services:
    api:
        container_name: api
        build: 
            context: .
            dockerfile: Dockerfile.api
        ports:
            - "8080:8080"
        environment:
            - ConnectionStrings__RelatoriosAPI=Host=db;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
            - ConnectionStrings__ConnectionRabbit=${RABBITMQ_URL}
        depends_on:
            - db
    worker:
        container_name: worker
        build: 
            context: .
            dockerfile: Dockerfile.Worker
        environment:
            - ConnectionStrings__RelatoriosAPI=Host=db;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
            - ConnectionStrings__ConnectionRabbit=${RABBITMQ_URL}
        depends_on:
            - db
            - api
    db:
        image: postgres:16
        container_name: relatorios-db
        environment:
            - POSTGRES_DB=${POSTGRES_DB}
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        volumes:
            - relatorios_data:/var/lib/postgresql/data
volumes:
    relatorios_data: